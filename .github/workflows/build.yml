name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build all projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CsharpProjects.sln

      - name: Build solution
        run: dotnet build CsharpProjects.sln --no-restore --configuration Release

      - name: Run data-structures demo
        run: dotnet run --project data-structures/data-structures.csproj --configuration Release

      - name: Run design-patterns demo
        run: dotnet run --project design-patterns/design-patterns.csproj --configuration Release
